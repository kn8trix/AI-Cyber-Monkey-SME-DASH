user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

    # Upstream backend servers
    upstream admin_backend {
        server app:3000;
    }

    upstream storefront_backend {
        least_conn;
        server app:3001 weight=1;
        server app:3002 weight=1;
        server app:3003 weight=1;
        server app:3004 weight=1;
        server app:3005 weight=1;
    }

    upstream cdn_backend {
        server app:5001;
    }

    # Admin dashboard server block
    server {
        listen 80;
        server_name admin.localhost admin.domain.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';" always;

        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-Host $server_name;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        location /assets/ {
            proxy_pass http://cdn_backend/assets/;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout invalid_header updating;
            add_header Cache-Control "public, max-age=2592000";
        }
    }

    # Catch-all storefront server block (wildcard domains)
    server {
        listen 80;
        server_name ~^(?<tenant>[^.]+)\.localhost$ ~^(?<tenant>[^.]+)\.domain\.com$;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';" always;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Tenant-ID" always;

        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://storefront_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-Host $server_name;
            proxy_set_header X-Tenant-ID $tenant;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        location /api/assets/ {
            limit_req zone=upload burst=5 nodelay;

            proxy_pass http://cdn_backend/assets/;
            proxy_set_header X-Tenant-ID $tenant;
            proxy_request_buffering off;
            proxy_http_version 1.1;
        }

        location /assets/ {
            proxy_pass http://cdn_backend/assets/;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout invalid_header updating;
            add_header Cache-Control "public, max-age=604800";
            add_header X-Cache-Status $upstream_cache_status;
        }
    }

    # CDN server block
    server {
        listen 80;
        server_name cdn.localhost cdn.domain.com *.cdn.domain.com;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        location / {
            proxy_pass http://cdn_backend;
            proxy_cache_valid 200 365d;
            proxy_cache_use_stale error timeout invalid_header updating;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }

    # Health check endpoint
    server {
        listen 80;
        server_name health.localhost health.domain.com;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
